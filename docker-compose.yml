name: wedding

services:
  postgres:
    container_name: postgres
    image: postgres:17
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: wedding
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    healthcheck:
      test: pg_isready -U admin -d wedding
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: api
    build:
      context: .
      dockerfile: bins/api/Dockerfile
    ports:
      - 8080:8080
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/wedding
    depends_on:
      postgres:
        condition: service_healthy
