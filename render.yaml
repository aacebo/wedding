databases:
  - name: wedding-db
    plan: basic-256mb
    region: virginia
    postgresMajorVersion: "17"
    databaseName: wedding
    user: admin

services:
  - type: web
    name: wedding-api
    runtime: docker
    plan: starter
    region: virginia
    dockerfilePath: bins/api/Dockerfile
    dockerContext: .
    healthCheckPath: /welcome
    autoDeploy: true
    domains:
      - baicebo.com
      - www.baicebo.com
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-db
          property: connectionString
