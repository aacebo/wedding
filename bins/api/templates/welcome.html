{% extends "base.html" %}

{% block title %}Nancy &amp; Alexander — Wedding{% endblock %}

{% block content %}
<main class="flex flex-col items-center justify-center min-h-[calc(100vh-4rem)] gap-6 p-8 text-center">
    <div class="w-56 text-ink/80">
        {% include "svg/skyline.svg" %}
    </div>

    <p class="text-xs uppercase tracking-[0.4em] text-accent">Together with their families</p>
    <h1 class="font-display text-6xl font-semibold tracking-wide text-ink">Nancy &amp; Alexander</h1>
    <p class="font-serif text-xl italic text-ink/70">We&#39;re getting married</p>

    <div class="w-44 text-accent">
        {% include "svg/frame.svg" %}
    </div>

    <button hx-get="/welcome/details" hx-swap="outerHTML"
            class="mt-2 border border-ink px-8 py-3 font-display text-sm uppercase tracking-[0.25em] text-ink transition hover:bg-ink hover:text-cream">
        Details
    </button>
</main>
{% endblock %}
