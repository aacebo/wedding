{% extends "base.html" %}

{% block title %}Server Status — Alex & Nancy{% endblock %}

{% block content %}
<main class="flex flex-col items-center justify-center min-h-screen p-8">
    <article class="w-full max-w-md border border-ink/15 bg-cream px-10 py-12 shadow-sm">
        <header class="flex flex-col items-center gap-3 text-center">
            <p class="text-xs uppercase tracking-[0.35em] text-accent">Alex &amp; Nancy</p>
            <h1 class="font-display text-4xl font-semibold tracking-wide text-ink">Server Status</h1>
            <div class="w-40 text-accent">
                {% include "svg/frame.svg" %}
            </div>
        </header>

        <dl class="mt-8 divide-y divide-ink/10 text-sm">
            <div class="flex items-baseline justify-between py-3">
                <dt class="uppercase tracking-[0.2em] text-ink/50">Version</dt>
                <dd class="font-display text-lg text-ink">{{ version }}</dd>
            </div>
            <div class="flex items-baseline justify-between py-3">
                <dt class="uppercase tracking-[0.2em] text-ink/50">Started</dt>
                <dd class="text-ink">{{ start_time }}</dd>
            </div>
            <div class="flex items-baseline justify-between py-3">
                <dt class="uppercase tracking-[0.2em] text-ink/50">Uptime</dt>
                <dd class="font-display text-lg text-ink">{{ uptime }}</dd>
            </div>
            <div class="flex items-baseline justify-between gap-4 py-3">
                <dt class="uppercase tracking-[0.2em] text-ink/50">Request ID</dt>
                <dd class="truncate text-right text-ink/70">{{ request_id }}</dd>
            </div>
        </dl>
    </article>
</main>
{% endblock %}
