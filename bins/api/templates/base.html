<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nancy & Alexander{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#F7F1E6',
                        ink: '#1A1A1A',
                        accent: '#6B7253',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'Georgia', 'serif'],
                        serif: ['"EB Garamond"', 'Georgia', 'serif'],
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-cream text-ink font-serif min-h-screen">
    <header class="w-full border-b border-ink/10">
        <nav class="mx-auto flex max-w-3xl flex-wrap items-center justify-center gap-x-6 gap-y-2 px-6 py-4 font-display text-xs uppercase tracking-[0.25em] text-ink/70">
            <a href="/welcome" class="transition hover:text-accent">Home</a>
            <a href="/story" class="transition hover:text-accent">Our Story</a>
            <a href="/schedule" class="transition hover:text-accent">Schedule</a>
            <a href="/travel" class="transition hover:text-accent">Travel</a>
            <a href="/venue" class="transition hover:text-accent">Venue</a>
            <a href="/contact" class="transition hover:text-accent">Contact</a>
            <a href="/guests" class="text-accent transition hover:text-ink">RSVP</a>
        </nav>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
